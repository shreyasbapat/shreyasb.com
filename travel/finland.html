<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Finland — Travels — Shreyas Bapat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --ink: #0e0e0d; --ink2: #3a3a38; --muted: #888882;
      --surface: #f7f5f0; --white: #fdfcfa;
      --border: rgba(0,0,0,0.1); --border2: rgba(0,0,0,0.06);
      --accent: #1a1a2e; --gold: #c9a84c;
      --serif: 'Instrument Serif', Georgia, serif;
      --sans: 'Inter', system-ui, sans-serif;
    }
    html { scroll-behavior: smooth; }
    body { font-family: var(--sans); background: var(--white); color: var(--ink); line-height: 1.6; -webkit-font-smoothing: antialiased; }
    a { color: inherit; text-decoration: none; }

    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 0 3rem; height: 64px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(253,252,250,0.92); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border2);
    }
    .nav-logo { font-family: var(--serif); font-size: 1.1rem; color: var(--ink); }
    .nav-back { font-size: 0.8rem; font-weight: 500; letter-spacing: 0.07em; text-transform: uppercase; color: var(--muted); transition: color 0.2s; }
    .nav-back:hover { color: var(--ink); }

    header {
      background: var(--accent); padding: 8rem 3rem 4rem;
      position: relative; overflow: hidden;
    }
    header::before {
      content: ''; position: absolute; inset: 0;
      background: radial-gradient(ellipse 60% 80% at 80% 50%, rgba(201,168,76,0.07) 0%, transparent 70%);
      pointer-events: none;
    }
    .header-inner { max-width: 960px; margin: 0 auto; }
    .header-eyebrow { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--gold); margin-bottom: 1rem; }
    .header-flag { font-size: 4rem; line-height: 1; margin-bottom: 1rem; }
    .header-title { font-family: var(--serif); font-size: clamp(2.5rem, 7vw, 5rem); line-height: 1; letter-spacing: -0.03em; color: #fff; margin-bottom: 1rem; }
    .header-continent { font-size: 0.8rem; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.3); }

    main { max-width: 960px; margin: 0 auto; padding: 4rem 3rem 6rem; }

    .section { margin-bottom: 3.5rem; }
    .section-label {
      font-size: 0.7rem; font-weight: 600; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 1.25rem; padding-bottom: 0.75rem;
      border-bottom: 1px solid var(--border);
    }

    .cities { display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .city {
      font-size: 0.85rem; font-weight: 500;
      padding: 0.35rem 0.85rem; border-radius: 4px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--ink2);
    }

    .notes-box {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 8px; padding: 2rem;
      min-height: 120px;
      font-size: 0.9rem; color: var(--muted);
      font-style: italic; line-height: 1.8;
    }

    .photos-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1rem;
    }
    .photo-placeholder {
      aspect-ratio: 4/3; background: var(--surface);
      border: 1px dashed var(--border); border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; color: rgba(0,0,0,0.2);
      letter-spacing: 0.06em; text-transform: uppercase;
    }

    .nav-countries {
      display: flex; justify-content: space-between; align-items: center;
      padding-top: 2rem; border-top: 1px solid var(--border);
      margin-top: 3rem;
    }
    .nav-country-link { font-size: 0.8rem; font-weight: 500; letter-spacing: 0.05em; text-transform: uppercase; color: var(--muted); transition: color 0.2s; }
    .nav-country-link:hover { color: var(--ink); }

    @media (max-width: 768px) {
      nav { padding: 0 1.5rem; }
      header { padding: 7rem 1.5rem 3rem; }
      main { padding: 3rem 1.5rem 5rem; }
    }
  </style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Shreyas Bapat</a>
  <a href="/travel.html" class="nav-back">← All countries</a>
</nav>

<header>
  <div class="header-inner">
    <div class="header-eyebrow">Travels</div>
    <div class="header-flag">🇫🇮</div>
    <h1 class="header-title">Finland</h1>
    <div class="header-continent">Europe</div>
  </div>
</header>

<main>

  <div class="section">
    <div class="section-label">Cities visited</div>
    <div class="cities">
      <span class="city">Coming soon</span>
    </div>
  </div>

  <div class="section">
    <div class="section-label">Notes &amp; highlights</div>
    <div class="notes-box">
      Stories and highlights coming soon.
    </div>
  </div>

  <div class="section">
    <div class="section-label">Photos</div>
    <div class="photos-grid">
      <div class="photo-placeholder">Photo</div>
      <div class="photo-placeholder">Photo</div>
      <div class="photo-placeholder">Photo</div>
    </div>
  </div>

  <div class="nav-countries">
    <a href="/travel.html" class="nav-country-link">← Back to all countries</a>
  </div>

</main>

</body>
</html>
